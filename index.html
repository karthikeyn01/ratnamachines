<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Ratna - Maintenance System</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #root {
      width: 100vw;
      height: 100vh;
    }
  </style>
  
  <script>
    // Suppress Tailwind CDN console warning
    const originalWarn = console.warn;
    console.warn = function(message) {
      if (message && typeof message === 'string' && message.includes('cdn.tailwindcss.com')) {
        return;
      }
      originalWarn.apply(console, arguments);
    };
  </script>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;
    const { AlertTriangle, CheckCircle, Clock, ChevronDown, ChevronRight, Wrench, Zap, FileText, Home, Save, X, Bell, Mail } = lucide;



// Complete PM/TBM data
const MECHANICAL_PM = [
  { id: 'mpm1', task: 'HT Greasing of Rack & Pinion', frequency: 'Weekly', category: 'mechanical' },
  { id: 'mpm2', task: 'Check tightness of tray chain', frequency: 'Weekly', category: 'mechanical' },
  { id: 'mpm3', task: 'Check oil level of main drive gearbox (Oil 320)', frequency: 'Monthly', category: 'mechanical' },
  { id: 'mpm4', task: 'Check main drive belt', frequency: 'Monthly', category: 'mechanical' },
  { id: 'mpm5', task: 'Check C-Fan belt and mounting tightness', frequency: 'Monthly', category: 'mechanical' },
  { id: 'mpm6', task: 'Check FD fan belt and mounting tightness', frequency: 'Monthly', category: 'mechanical' },
  { id: 'mpm7', task: 'Check the condition of Exhaust fan\'s belt', frequency: 'Monthly', category: 'mechanical' },
  { id: 'mpm8', task: 'HT Greasing of C fan bearing', frequency: 'Monthly', category: 'mechanical' },
  { id: 'mpm9', task: 'HT greasing of FD fan', frequency: 'Monthly', category: 'mechanical' },
  { id: 'mpm10', task: 'HT Greasing of sprocket housing', frequency: 'Monthly', category: 'mechanical' },
  { id: 'mpm11', task: 'Alignment of Loading platform with sprit and water level', frequency: 'Monthly', category: 'mechanical' },
  { id: 'mpm12', task: 'Alignment of Unloading platform with sprit and water level', frequency: 'Monthly', category: 'mechanical' },
  { id: 'mpm13', task: 'Condition of Main drive sprocket and bearing wear of tray chain', frequency: 'Monthly', category: 'mechanical' },
];

const ELECTRICAL_PM = [
  { id: 'epm1', task: 'Cleaning and tightening of the sensor at loading', frequency: 'Weekly', category: 'electrical' },
  { id: 'epm2', task: 'Cleaning and tightening of the sensor at unloading', frequency: 'Weekly', category: 'electrical' },
  { id: 'epm3', task: 'Limit switch working of Loading platform', frequency: 'Weekly', category: 'electrical' },
  { id: 'epm4', task: 'Limit switch working of unloading platform', frequency: 'Weekly', category: 'electrical' },
  { id: 'epm5', task: 'Motor check of Oven loader pusher', frequency: 'Weekly', category: 'electrical' },
  { id: 'epm6', task: 'Motor check of Oven unloader Rack & Pinion', frequency: 'Weekly', category: 'electrical' },
  { id: 'epm7', task: 'Motor check of roller platform after unloading', frequency: 'Weekly', category: 'electrical' },
  { id: 'epm8', task: 'Sensor (9 Nos) cleaning and working of Unloading platform', frequency: 'Weekly', category: 'electrical' },
  { id: 'epm9', task: 'Main panel cleaning and filter cleaning', frequency: 'Monthly', category: 'electrical' },
  { id: 'epm10', task: 'Sensor Tightening Homing sensor of the cradle position', frequency: 'Monthly', category: 'electrical' },
];

const TBM_TASKS = [
  { id: 'tbm1', task: 'Main drive sprocket and Idler sprockets housing bearing greasing', frequency: 'Monthly', category: 'tbm' },
  { id: 'tbm2', task: 'Mould cooler filter and water circulation fins cleaning', frequency: 'Monthly', category: 'tbm' },
  { id: 'tbm3', task: 'Cradle Base Pin/ shear pin replacement', frequency: '6 months', category: 'tbm' },
  { id: 'tbm4', task: 'Drive motor break assembly break pad check and replace', frequency: '3 months', category: 'tbm' },
  { id: 'tbm5', task: 'Cradle cotter pin replacement', frequency: '3 months', category: 'tbm' },
  { id: 'tbm6', task: 'Drive V-Belt replacement (V-Belt B86)', frequency: '3 months', category: 'tbm' },
  { id: 'tbm7', task: 'Circulation fan motor V-belt replacement (V-Belt B45)', frequency: '3 months', category: 'tbm' },
  { id: 'tbm8', task: 'Force radiation fan motor V-belt replacement (V-Belt B69)', frequency: '3 months', category: 'tbm' },
  { id: 'tbm9', task: 'Exhaust fan motor V-belt replacement (V-Belt B40)', frequency: '3 months', category: 'tbm' },
  { id: 'tbm10', task: 'Oven chamber inspection and oil depositions on radial tube cleaning', frequency: '3 months', category: 'tbm' },
  { id: 'tbm11', task: 'Burner servicing', frequency: '3 months', category: 'tbm' },
  { id: 'tbm12', task: 'Main Drive Gear box oil change (320 Oil)', frequency: '6 months', category: 'tbm' },
];

const IndustrialMaintenanceApp = () => {
  const [activeMenu, setActiveMenu] = useState('dashboard');
  const [expandedMenus, setExpandedMenus] = useState(['swing-oven', 'pm']);
  const [showBreakdownModal, setShowBreakdownModal] = useState(false);
  
  // Task executions - each task execution is stored individually with its own date
  const [taskExecutions, setTaskExecutions] = useState(() => {
    const saved = localStorage.getItem('task_executions');
    return saved ? JSON.parse(saved) : [];
  });

  const [breakdownRecords, setBreakdownRecords] = useState(() => {
    const saved = localStorage.getItem('breakdown_records');
    return saved ? JSON.parse(saved) : [];
  });

  useEffect(() => {
    localStorage.setItem('task_executions', JSON.stringify(taskExecutions));
  }, [taskExecutions]);

  useEffect(() => {
    localStorage.setItem('breakdown_records', JSON.stringify(breakdownRecords));
  }, [breakdownRecords]);

  const calculateNextDue = (lastDate, frequency) => {
    if (!lastDate) return null;
    const date = new Date(lastDate);
    switch(frequency) {
      case 'Weekly': date.setDate(date.getDate() + 7); break;
      case 'Monthly': date.setMonth(date.getMonth() + 1); break;
      case '3 months': date.setMonth(date.getMonth() + 3); break;
      case '6 months': date.setMonth(date.getMonth() + 6); break;
      default: date.setDate(date.getDate() + 30);
    }
    return date.toISOString().split('T')[0];
  };

  const getTaskStatus = (taskId) => {
    const executions = taskExecutions.filter(e => e.taskId === taskId);
    if (executions.length === 0) return { status: 'overdue', nextDue: null, lastDone: null };
    
    const latest = executions.sort((a, b) => new Date(b.executedDate) - new Date(a.executedDate))[0];
    const task = [...MECHANICAL_PM, ...ELECTRICAL_PM, ...TBM_TASKS].find(t => t.id === taskId);
    const nextDue = calculateNextDue(latest.executedDate, task.frequency);
    
    if (!nextDue) return { status: 'overdue', nextDue: null, lastDone: latest.executedDate };
    
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const dueDate = new Date(nextDue);
    dueDate.setHours(0, 0, 0, 0);
    const diffDays = Math.floor((dueDate - today) / (1000 * 60 * 60 * 24));
    
    if (diffDays < 0) return { status: 'overdue', nextDue, lastDone: latest.executedDate };
    if (diffDays <= 3) return { status: 'due-soon', nextDue, lastDone: latest.executedDate };
    return { status: 'healthy', nextDue, lastDone: latest.executedDate };
  };

  const getComplianceMetrics = (category) => {
    let tasks;
    if (category === 'mechanical') tasks = MECHANICAL_PM;
    else if (category === 'electrical') tasks = ELECTRICAL_PM;
    else tasks = TBM_TASKS;

    let overdue = 0, dueSoon = 0, healthy = 0;
    const completedTasks = new Set();
    
    tasks.forEach(task => {
      const { status } = getTaskStatus(task.id);
      if (status === 'overdue') overdue++;
      else if (status === 'due-soon') dueSoon++;
      else healthy++;
      
      // Check if task has ever been completed
      const hasExecution = taskExecutions.some(e => e.taskId === task.id);
      if (hasExecution) completedTasks.add(task.id);
    });

    const compliance = tasks.length > 0 ? Math.round((completedTasks.size / tasks.length) * 100) : 0;
    return { overdue, dueSoon, healthy, compliance, total: tasks.length, completed: completedTasks.size };
  };

  const toggleMenu = (menu) => {
    setExpandedMenus(prev => 
      prev.includes(menu) ? prev.filter(m => m !== menu) : [...prev, menu]
    );
  };

  const handleResetData = () => {
    if (window.confirm('⚠️ This will clear ALL saved data. Are you sure?')) {
      localStorage.clear();
      window.location.reload();
    }
  };

  const renderContent = () => {
    switch(activeMenu) {
      case 'dashboard':
        return <MainDashboard 
          mechanicalMetrics={getComplianceMetrics('mechanical')}
          electricalMetrics={getComplianceMetrics('electrical')}
          tbmMetrics={getComplianceMetrics('tbm')}
        />;
      case 'pm-mechanical':
        return <PMExecutionView 
          tasks={MECHANICAL_PM} 
          title="PM - Mechanical" 
          category="mechanical"
          taskExecutions={taskExecutions}
          onSave={(executions) => setTaskExecutions([...taskExecutions, ...executions])}
          getTaskStatus={getTaskStatus}
        />;
      case 'pm-electrical':
        return <PMExecutionView 
          tasks={ELECTRICAL_PM} 
          title="PM - Electrical" 
          category="electrical"
          taskExecutions={taskExecutions}
          onSave={(executions) => setTaskExecutions([...taskExecutions, ...executions])}
          getTaskStatus={getTaskStatus}
        />;
      case 'tbm':
        return <TBMExecutionView 
          tasks={TBM_TASKS} 
          taskExecutions={taskExecutions}
          onSave={(executions) => setTaskExecutions([...taskExecutions, ...executions])}
          getTaskStatus={getTaskStatus}
        />;
      case 'breakdowns':
        return <BreakdownsView 
          breakdowns={breakdownRecords}
          onAddBreakdown={() => setShowBreakdownModal(true)}
        />;
      case 'reports-mechanical':
        return <HistoryView 
          executions={taskExecutions.filter(e => e.category === 'mechanical')}
          tasks={MECHANICAL_PM}
          title="PM Mechanical History"
        />;
      case 'reports-electrical':
        return <HistoryView 
          executions={taskExecutions.filter(e => e.category === 'electrical')}
          tasks={ELECTRICAL_PM}
          title="PM Electrical History"
        />;
      case 'reports-tbm':
        return <HistoryView 
          executions={taskExecutions.filter(e => e.category === 'tbm')}
          tasks={TBM_TASKS}
          title="TBM History"
        />;
      case 'alerts':
        return <AlertsView 
          tasks={[...MECHANICAL_PM, ...ELECTRICAL_PM, ...TBM_TASKS]}
          getTaskStatus={getTaskStatus}
        />;
      default:
        return <MainDashboard 
          mechanicalMetrics={getComplianceMetrics('mechanical')}
          electricalMetrics={getComplianceMetrics('electrical')}
          tbmMetrics={getComplianceMetrics('tbm')}
          onReset={handleResetData}
        />;
    }
  };

  return (
    <div className="flex h-screen bg-slate-50">
      {showBreakdownModal && (
        <BreakdownModal
          onClose={() => setShowBreakdownModal(false)}
          onSave={(record) => {
            setBreakdownRecords([...breakdownRecords, record]);
            setShowBreakdownModal(false);
          }}
        />
      )}

      {/* Sidebar */}
      <div className="w-72 bg-gradient-to-b from-slate-900 via-slate-800 to-slate-900 text-slate-100 flex flex-col border-r border-slate-700 shadow-2xl">
        <div className="p-6 border-b border-slate-700 bg-slate-900/50">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 bg-gradient-to-br from-amber-500 to-orange-600 rounded-lg flex items-center justify-center shadow-lg">
              <Wrench className="w-6 h-6 text-white" />
            </div>
            <div>
              <h1 className="text-lg font-bold tracking-tight">Project Ratna</h1>
              <p className="text-xs text-slate-400 font-medium">Machines</p>
            </div>
          </div>
        </div>

        <nav className="flex-1 overflow-y-auto p-4 space-y-2">
          <div className="bg-slate-800/40 rounded-lg border border-slate-700/50">
            <button 
              onClick={() => toggleMenu('swing-oven')}
              className="w-full px-4 py-3 flex items-center justify-between text-sm font-semibold hover:bg-slate-700/30 rounded-lg transition-all"
            >
              <span className="flex items-center gap-2">
                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse" />
                <strong>Swing Oven</strong>
              </span>
              {expandedMenus.includes('swing-oven') ? <ChevronDown className="w-4 h-4" /> : <ChevronRight className="w-4 h-4" />}
            </button>
            
            {expandedMenus.includes('swing-oven') && (
              <div className="px-2 pb-2 space-y-1">
                <NavItem icon={<Home size={16} />} label="Dashboard" active={activeMenu === 'dashboard'} onClick={() => setActiveMenu('dashboard')} />
                
                <div className="pt-2">
                  <button 
                    onClick={() => toggleMenu('pm')}
                    className="w-full px-3 py-2 flex items-center justify-between text-xs font-medium text-slate-300 hover:text-white transition-colors"
                  >
                    <span className="flex items-center gap-2">
                      <Wrench size={14} />
                      PM (Preventive Maint.)
                    </span>
                    {expandedMenus.includes('pm') ? <ChevronDown className="w-3 h-3" /> : <ChevronRight className="w-3 h-3" />}
                  </button>
                  {expandedMenus.includes('pm') && (
                    <div className="ml-6 mt-1 space-y-1">
                      <NavItem label="Mechanical" active={activeMenu === 'pm-mechanical'} onClick={() => setActiveMenu('pm-mechanical')} sub />
                      <NavItem label="Electrical" active={activeMenu === 'pm-electrical'} onClick={() => setActiveMenu('pm-electrical')} sub />
                    </div>
                  )}
                </div>

                <NavItem icon={<Clock size={16} />} label="TBM" active={activeMenu === 'tbm'} onClick={() => setActiveMenu('tbm')} />
                <NavItem icon={<AlertTriangle size={16} />} label="Breakdowns" active={activeMenu === 'breakdowns'} onClick={() => setActiveMenu('breakdowns')} />
                
                <div className="pt-2">
                  <button 
                    onClick={() => toggleMenu('reports')}
                    className="w-full px-3 py-2 flex items-center justify-between text-xs font-medium text-slate-300 hover:text-white transition-colors"
                  >
                    <span className="flex items-center gap-2">
                      <FileText size={14} />
                      Reports & History
                    </span>
                    {expandedMenus.includes('reports') ? <ChevronDown className="w-3 h-3" /> : <ChevronRight className="w-3 h-3" />}
                  </button>
                  {expandedMenus.includes('reports') && (
                    <div className="ml-6 mt-1 space-y-1">
                      <NavItem label="Mechanical History" active={activeMenu === 'reports-mechanical'} onClick={() => setActiveMenu('reports-mechanical')} sub />
                      <NavItem label="Electrical History" active={activeMenu === 'reports-electrical'} onClick={() => setActiveMenu('reports-electrical')} sub />
                      <NavItem label="TBM History" active={activeMenu === 'reports-tbm'} onClick={() => setActiveMenu('reports-tbm')} sub />
                    </div>
                  )}
                </div>

                <NavItem icon={<Bell size={16} />} label="Alerts & Notifications" active={activeMenu === 'alerts'} onClick={() => setActiveMenu('alerts')} />
              </div>
            )}
          </div>
        </nav>
      </div>

      {/* Main Content */}
      <div className="flex-1 overflow-auto">
        {renderContent()}
      </div>
    </div>
  );
};

const NavItem = ({ icon, label, active, onClick, sub }) => (
  <button
    onClick={onClick}
    className={`w-full px-3 py-2 flex items-center gap-2 text-xs font-medium rounded-md transition-all ${
      active 
        ? 'bg-gradient-to-r from-amber-500/20 to-orange-500/20 text-white border-l-2 border-amber-500' 
        : 'text-slate-400 hover:text-white hover:bg-slate-700/30'
    }`}
  >
    {icon}
    <span>{label}</span>
  </button>
);

const PMExecutionView = ({ tasks, title, category, taskExecutions, onSave, getTaskStatus }) => {
  const weeklyTasks = tasks.filter(t => t.frequency === 'Weekly');
  const monthlyTasks = tasks.filter(t => t.frequency === 'Monthly');

  return (
    <div className="p-8 space-y-6">
      <div>
        <h2 className="text-3xl font-bold text-slate-900">{title}</h2>
        <p className="text-slate-500 mt-1">Track weekly and monthly inspections separately</p>
      </div>

      {/* Weekly Section */}
      {weeklyTasks.length > 0 && (
        <WeeklyPMSection 
          tasks={weeklyTasks}
          category={category}
          onSave={onSave}
          getTaskStatus={getTaskStatus}
        />
      )}

      {/* Monthly Section */}
      {monthlyTasks.length > 0 && (
        <MonthlyPMSection 
          tasks={monthlyTasks}
          category={category}
          taskExecutions={taskExecutions}
          onSave={onSave}
          getTaskStatus={getTaskStatus}
        />
      )}
    </div>
  );
};

const WeeklyPMSection = ({ tasks, category, onSave, getTaskStatus }) => {
  const [formData, setFormData] = useState({
    technicianName: '',
    executionDate: new Date().toISOString().split('T')[0],
    checkedTasks: {},
    remarks: {},
    photos: {}
  });

  const checkedCount = Object.values(formData.checkedTasks).filter(Boolean).length;
  const compliance = Math.round((checkedCount / tasks.length) * 100);

  const handleSave = () => {
    const executions = [];
    Object.keys(formData.checkedTasks).forEach(taskId => {
      if (formData.checkedTasks[taskId]) {
        executions.push({
          id: Date.now() + Math.random(),
          taskId,
          category,
          technicianName: formData.technicianName,
          executedDate: formData.executionDate,
          remarks: formData.remarks[taskId] || '',
          photo: formData.photos[taskId] || null,
          timestamp: new Date().toISOString()
        });
      }
    });

    if (executions.length > 0) {
      onSave(executions);
      alert(`${executions.length} weekly tasks saved!`);
      setFormData({
        technicianName: '',
        executionDate: new Date().toISOString().split('T')[0],
        checkedTasks: {},
        remarks: {},
        photos: {}
      });
    }
  };

  return (
    <div className="bg-white rounded-xl border border-blue-200 shadow-sm">
      <div className="px-6 py-4 border-b bg-blue-50 flex items-center justify-between">
        <div>
          <h3 className="font-bold text-slate-900">📅 Weekly PM Checklist</h3>
          <p className="text-sm text-slate-600">Complete all weekly tasks together - {compliance}%</p>
        </div>
        <span className="px-3 py-1 bg-blue-600 text-white text-sm font-bold rounded-full">
          {checkedCount}/{tasks.length}
        </span>
      </div>

      <div className="p-6 space-y-4">
        <div className="grid grid-cols-2 gap-4">
          <input
            type="text"
            value={formData.technicianName}
            onChange={(e) => setFormData({...formData, technicianName: e.target.value})}
            placeholder="Technician Name"
            className="px-3 py-2 border rounded-lg"
          />
          <input
            type="date"
            value={formData.executionDate}
            onChange={(e) => setFormData({...formData, executionDate: e.target.value})}
            className="px-3 py-2 border rounded-lg"
          />
        </div>

        <div className="space-y-2">
          {tasks.map((task, idx) => (
            <div key={task.id} className={`p-4 rounded-lg border-2 transition-all ${formData.checkedTasks[task.id] ? 'border-green-300 bg-green-50' : 'border-slate-200'}`}>
              <label className="flex items-start gap-3 cursor-pointer">
                <input
                  type="checkbox"
                  checked={formData.checkedTasks[task.id] || false}
                  onChange={(e) => setFormData({...formData, checkedTasks: {...formData.checkedTasks, [task.id]: e.target.checked}})}
                  className="w-5 h-5 text-green-600 rounded mt-1"
                />
                <div className="flex-1">
                  <div className="font-medium text-slate-900">{idx + 1}. {task.task}</div>
                  <input
                    type="text"
                    value={formData.remarks[task.id] || ''}
                    onChange={(e) => setFormData({...formData, remarks: {...formData.remarks, [task.id]: e.target.value}})}
                    placeholder="Remarks (optional)"
                    className="mt-2 w-full px-3 py-2 text-sm border rounded-lg"
                  />
                </div>
              </label>
            </div>
          ))}
        </div>

        <button
          onClick={handleSave}
          disabled={!formData.technicianName || checkedCount === 0}
          className="w-full py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
        >
          <Save className="w-5 h-5" />
          Save Weekly PM ({checkedCount} tasks)
        </button>
      </div>
    </div>
  );
};

const MonthlyPMSection = ({ tasks, category, taskExecutions, onSave, getTaskStatus }) => {
  return (
    <div className="bg-white rounded-xl border border-purple-200 shadow-sm">
      <div className="px-6 py-4 border-b bg-purple-50">
        <h3 className="font-bold text-slate-900">📅 Monthly PM Tasks</h3>
        <p className="text-sm text-slate-600">Each task tracked individually with separate dates</p>
      </div>

      <div className="divide-y">
        {tasks.map((task, idx) => (
          <MonthlyTaskRow 
            key={task.id}
            task={task}
            index={idx}
            category={category}
            onSave={onSave}
            getTaskStatus={getTaskStatus}
          />
        ))}
      </div>
    </div>
  );
};

const MonthlyTaskRow = ({ task, index, category, onSave, getTaskStatus }) => {
  const [showForm, setShowForm] = useState(false);
  const [formData, setFormData] = useState({
    technicianName: '',
    executedDate: new Date().toISOString().split('T')[0],
    remarks: '',
    photo: null
  });

  const { status, nextDue, lastDone } = getTaskStatus(task.id);

  const handleSave = () => {
    onSave([{
      id: Date.now(),
      taskId: task.id,
      category,
      technicianName: formData.technicianName,
      executedDate: formData.executedDate,
      remarks: formData.remarks,
      photo: formData.photo,
      timestamp: new Date().toISOString()
    }]);
    setShowForm(false);
    setFormData({
      technicianName: '',
      executedDate: new Date().toISOString().split('T')[0],
      remarks: '',
      photo: null
    });
  };

  return (
    <div className="p-4">
      <div className="flex items-center justify-between mb-2">
        <div className="flex-1">
          <div className="font-medium text-slate-900">{index + 1}. {task.task}</div>
          <div className="text-sm text-slate-500 mt-1">
            {lastDone ? (
              <>Last done: {new Date(lastDone).toLocaleDateString('en-IN')} • Next due: {nextDue}</>
            ) : (
              <>Never executed</>
            )}
          </div>
        </div>
        <div className="flex items-center gap-2">
          <span className={`px-3 py-1 text-xs font-semibold rounded-full ${
            status === 'overdue' ? 'bg-red-100 text-red-700' :
            status === 'due-soon' ? 'bg-amber-100 text-amber-700' :
            'bg-green-100 text-green-700'
          }`}>
            {status === 'overdue' ? 'Overdue' : status === 'due-soon' ? 'Due Soon' : 'OK'}
          </span>
          <button
            onClick={() => setShowForm(!showForm)}

    const minutes = Math.round((end - start) / (1000 * 60));

const BreakdownsView = ({ breakdowns, onAddBreakdown }) => {
  const openBreakdowns = breakdowns.filter(b => !b.resolvedAt);
  const resolvedBreakdowns = breakdowns.filter(b => b.resolvedAt);
  
  // Calculate MTBF (Mean Time Between Failures)
  const thirtyDaysAgo = new Date();
  thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
  const recentBreakdowns = breakdowns.filter(b => new Date(b.startedAt) >= thirtyDaysAgo);
  const totalHoursInPeriod = 30 * 24;
  const mtbf = recentBreakdowns.length > 0 
    ? Math.round(totalHoursInPeriod / recentBreakdowns.length)
    : totalHoursInPeriod;

  // Calculate Average MTTR
  const avgMTTR = resolvedBreakdowns.length > 0
    ? Math.round(resolvedBreakdowns.reduce((sum, b) => sum + (b.mttr || 0), 0) / resolvedBreakdowns.length)
    : 0;

  return (
    <div className="p-8 space-y-6">
      <div className="flex items-center justify-between">
        <div>

          <div className="text-4xl font-bold text-amber-600">{openBreakdowns.length}</div>

        <div className="bg-white rounded-xl border border-green-200 p-5 shadow-sm">
          <div className="text-xs font-semibold text-slate-600 uppercase mb-2">Avg MTTR</div>
          <div className="text-4xl font-bold text-green-600">{avgMTTR}</div>

                  </td>
                  <td className="px-6 py-4 text-sm text-slate-600">
                    {b.resolvedAt ? (
                      new Date(b.resolvedAt).toLocaleString('en-IN', { 
                        day: '2-digit', 
                        month: 'short', 
                        hour: '2-digit', 
                        minute: '2-digit' 
                      })
                    ) : (
                      <span className="text-red-600 font-semibold">Ongoing</span>
                    )}
                  </td>
                  <td className="px-6 py-4 text-sm font-semibold">
                    {b.mttr ? `${b.mttr} min` : '—'}
                  </td>
                  <td className="px-6 py-4">
                    <span className={`px-2 py-1 text-xs font-semibold rounded ${
                      b.severity === 'critical' ? 'bg-red-100 text-red-700' :
                      b.severity === 'high' ? 'bg-orange-100 text-orange-700' :
                      b.severity === 'medium' ? 'bg-amber-100 text-amber-700' :
                      'bg-blue-100 text-blue-700'
                    }`}>
                      {b.severity}
                    </span>
                  </td>
                </tr>
              ))
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
};


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<IndustrialMaintenanceApp />);
  </script>
</body>
</html>
